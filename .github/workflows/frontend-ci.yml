name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'Crowdfunding.Frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'Crowdfunding.Frontend/**'

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Crowdfunding.Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./Crowdfunding.Frontend

      - name: Lint (ESLint)
        run: npm run lint
        working-directory: ./Crowdfunding.Frontend

      - name: Run Tests
        run: npm test -- --watchAll=false
        working-directory: ./Crowdfunding.Frontend

      - name: Build
        run: npm run build
        working-directory: ./Crowdfunding.Frontend

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: ./Crowdfunding.Frontend