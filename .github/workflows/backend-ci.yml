name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'Crowdfunding.API/**' 
      - 'Crowfunding.API.sln'       
  pull_request:
    branches: [main]
    paths:
      - 'Crowdfunding.API/**' 
      - 'Crowfunding.API.sln' 

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.416'       

      - name: Restore dependencies
        run: dotnet restore Crowfunding.API.sln

      - name: Build
        run: dotnet build Crowfunding.API.sln --no-restore --configuration Release

      - name: Run Tests
        run: dotnet test Crowfunding.API.sln --no-build --verbosity normal

      - name: Lint (Format Check)
        run: dotnet format Crowfunding.API.sln --verify-no-changes

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy (vulnerability scanner)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './Crowdfunding.API'
          severity: 'CRITICAL,HIGH'